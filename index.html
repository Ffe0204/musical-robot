// 🛠 工具
// ═══════════════════════════════════════════════════════════════════
const isMobile = () => window.innerWidth < 768;

function getRelated(nodeId) {
  const sub = SUB[nodeId];
  if(!sub || !sub.links) return [];
  return sub.links.map(l => {
    const tid = l.s==='center' ? l.t : (l.t==='center' ? l.s : l.t);
    const n = sub.nodes.find(x => x.id===tid);
    if(!n) return null;
    const hk = nodeId+':'+n.id, hl = REL_HIGHLIGHTS[hk]||{tag:'',clause:'',tc:'#94a3b8'};
    return { fn: n.name.replace(/\n/g,' '), rel: l.label.replace(/[▶→]/g,''), clause: hl.clause, tag: hl.tag, tc: hl.tc, url: n.link };
  }).filter(Boolean);
}

// ── SVG 径向关系图谱（中文适配 + 大半径避免重叠）───────────────
function buildSVG(centerName, centerColor, links, maxN) {
  const N = Math.min(links.length, maxN||5);
  if(N===0) return '';

  const W=680, H=400, cx=330, cy=210, R=170;
  let s=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="display:block;margin:4px auto 0;">`;
  s+=`<defs><filter id="sg"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.12"/></filter></defs>`;

  // 中心节点
  const cw=150, ch=34;
  s+=`<rect x="${cx-cw/2}" y="${cy-ch/2}" width="${cw}" height="${ch}" rx="8" fill="${centerColor}" filter="url(#sg)"/>`;
  s+=`<text x="${cx}" y="${cy+5}" text-anchor="middle" fill="#fff" font-size="13" font-weight="700">${centerName}</text>`;

  for(let i=0; i<N; i++){
    const a = (i/N)*2*Math.PI - Math.PI/2;
    const nx = cx + R*Math.cos(a), ny = cy + R*Math.sin(a);
    const r = links[i];

    // 连接线
    s+=`<line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" stroke="#c8d6e5" stroke-width="1.2" stroke-dasharray="5,3"/>`;

    // 关系标签（无背景框，文字直接浮在线上，白描边确保可读）
    const lx = cx + (nx-cx)*0.50;
    const ly = cy + (ny-cy)*0.50;
    s+=`<text x="${lx}" y="${ly+4}" text-anchor="middle" fill="#5a7c9a" font-size="9" font-weight="600" stroke="#fff" stroke-width="2.5" paint-order="stroke">${r.rel}</text>`;

    // 关联节点（中文适配：每字11px）
    const nm = r.fn.length>10 ? r.fn.slice(0,9)+'…' : r.fn;
    const nw = Math.max(nm.length*11+14, 80); // 中文宽11px/字
    const nh = 24;
    let nnx = nx, nnw = nw;
    if(nx-nw/2<5) nnx = nw/2+5;
    if(nx+nw/2>W-5) nnx = W-5-nw/2;
    s+=`<rect x="${nnx-nnw/2}" y="${ny-nh/2}" width="${nnw}" height="${nh}" rx="6" fill="#f0f5ff" stroke="#c8d6e5" stroke-width="1"/>`;
    s+=`<text x="${nnx}" y="${ny+5}" text-anchor="middle" fill="#2b579a" font-size="11" font-weight="600">${nm}</text>`;

    // 高亮标签（小号紧凑）
    if(r.tag){
      const tw=r.tag.length*8+8, th=13;
      let tx = nx>cx ? nnx+nnw/2+4 : nnx-nnw/2-4-tw;
      if(tx<2) tx=2;
      if(tx+tw>W-4) tx=W-4-tw;
      s+=`<rect x="${tx}" y="${ny-6}" width="${tw}" height="${th}" rx="3" fill="${r.tc}18" stroke="${r.tc}30" stroke-width="0.5"/>`;
      s+=`<text x="${tx+tw/2}" y="${ny+4}" text-anchor="middle" fill="${r.tc}" font-size="8" font-weight="600">${r.tag}</text>`;
    }

    // 条款批注
    if(r.clause){
      s+=`<text x="${nnx}" y="${ny+nh/2+14}" text-anchor="middle" fill="#c23531" font-size="8">⚑ ${r.clause.length>16?r.clause.slice(0,15)+'…':r.clause}</text>`;
    }
  }
  s+='</svg>';
  return s;
}

// ── Tooltip HTML ──
function buildTip(node){
  const links = getRelated(node.id);
  const bc = node.isNew?'#c23531':'#2b579a', bg = node.isNew?'rgba(194,53,49,0.12)':'rgba(43,87,154,0.1)';
  const maxG = isMobile()?3:5;
  let h='<div class="tt-wrap">';
  h+=`<div class="tt-hdr"><span class="tt-name">${node.name}</span><span class="tt-badge" style="background:${bg};color:${bc}">${node.stage}</span></div>`;
  h+=`<div class="tt-meta">${node.sub} · ${node.year}${node.badge?' · '+node.badge:''}</div>`;
  h+=`<div class="tt-summary">${node.summary}</div>`;
  if(links.length) {
    h+=`<div class="tt-graph-title">🔗 以「${node.name}」为中心的关系图谱</div>`;
    h+=buildSVG(node.name, node.color, links, maxG);
  }
  h+=`<div class="tt-footer"><a href="${node.feishuDoc}" target="_blank">📄 详情文档 →</a><span class="tt-hint">单击跳转</span></div></div>`;
  return h;
}

// ── Mobile Modal ──
function buildMob(node){
  const links = getRelated(node.id);
  const bc=node.isNew?'#c23531':'#2b579a', bg=node.isNew?'rgba(194,53,49,0.12)':'rgba(43,87,154,0.1)';
  let h=`<div class="mm-badge" style="background:${bg};color:${bc}">${node.stage} · ${node.badge||''}</div>`;
  h+=`<div class="mm-meta">${node.sub} · ${node.year}</div><div class="mm-summary">${node.summary}</div>`;
  if(node.clauses&&node.clauses.length){
    h+='<div class="mm-section-title">📋 关键条款</div>';
    h+=`<div class="mm-clause-item">${node.clauses[0]}</div>`;
  }
  if(links.length){
    h+='<div class="mm-section-title">🔗 关联政策（手机端仅展示前4项）</div>';
    links.slice(0,4).forEach(r=>{
      const ts=r.tc?`background:${r.tc}15;color:${r.tc}`:'background:#f0f2f5;color:#5a6c7d';
      h+=`<div class="mm-rel-item"><span class="mm-rel-arrow">◀ ${r.rel} ▶</span><span class="mm-rel-name">${r.fn}</span>${r.tag?`<span class="mm-rel-tag" style="${ts}">${r.tag}</span>`:''}</div>`;
      if(r.clause) h+=`<div style="font-size:10px;color:#c23531;padding:0 8px 2px 24px;margin-top:-1px;">⚑ ${r.clause}</div>`;
    });
  }
  return h;
}

}
