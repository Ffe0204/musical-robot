const docRoot='./';
const isMobile = () => window.innerWidth<768;
const params = new URLSearchParams(location.search);

function getNodeById(id){ return NODES.find(n=>n.id===id); }

function getLinks(nodeId){
  const sub=SUB[nodeId]; if(!sub||!sub.links) return [];
  return sub.links.map(l=>{
    const tid=l.s==='center'?l.t:(l.t==='center'?l.s:l.t);
    const n=sub.nodes.find(x=>x.id===tid); if(!n) return null;
    const hk=nodeId+':'+n.id, hl=REL_HIGHLIGHTS[hk]||{tag:'',clause:'',tc:'#94a3b8'};
    return{fn:n.name.replace(/\n/g,' '),rel:l.label.replace(/[▶→]/g,''),clause:hl.clause,tag:hl.tag,tc:hl.tc,url:n.link};
  }).filter(Boolean);
}

// ── 渲染政策详情 ──
function renderPolicy(id){
  const node=getNodeById(id);
  if(!node){ document.getElementById('mainContent').innerHTML='<p>政策未找到</p>'; return; }
  document.getElementById('breadcrumb').textContent='› '+node.name;
  document.title=node.name+' - 政策详情';
  const bc=node.isNew?'#c23531':'#2b579a', bg=node.isNew?'rgba(194,53,49,0.12)':'rgba(43,87,154,0.1)';
  const links=getLinks(node.id);
  const maxLinks=isMobile()?4:10;

  let html=`<div class="doc-card">
    <div class="doc-hdr"><h1>${node.name}</h1><span class="doc-badge" style="background:${bg};color:${bc}">${node.stage}</span></div>
    <div class="doc-meta">${node.sub} · ${node.year}${node.badge?' · '+node.badge:''}</div>
    <div class="doc-tags">体系：${node.stage.split('/').map(s=>`<a class="doc-tag" href="${docRoot}doc.html?system=${encodeURIComponent(s.trim())}" style="background:${bg};color:${bc}">${s.trim()}</a>`).join('')}</div>
    <div class="doc-section"><h3>📋 简介</h3><div class="doc-text">${node.summary}</div></div>
    <div class="doc-section"><h3>📄 要点</h3><div class="doc-text">${(node.clauses||[]).map(c=>`<span class="clause">${c}</span>`).join('')}</div></div>
    <div class="doc-section"><h3>🔗 官方原文</h3><a class="doc-link" href="${node.link}" target="_blank">↗ 政府官网</a></div>`;

  if(links.length){
    html+=`<div class="doc-section"><h3>🔗 以「${node.name}」为中心的关联政策关系图</h3>
      <div class="sub-graph-wrap" id="subGraph"></div>
      <div class="sub-graph-hint">图中节点均可点击查看详情</div></div>
      <div class="doc-section"><h3>📑 相关政策文件（${isMobile()?'手机仅展示前4项':''}）</h3><div class="rel-list">`;
    links.slice(0,maxLinks).forEach(r=>{
      const ts=r.tc?`background:${r.tc}15;color:${r.tc};border:1px solid ${r.tc}30`:'';
      html+=`<a class="rel-item" href="${r.url}" target="_blank">
        <span class="rel-conn">◀ ${r.rel} ▶</span><span class="rel-name">${r.fn}</span>
        ${r.tag?`<span class="rel-tag" style="${ts}">${r.tag}</span>`:''}
        ${r.clause?`<span class="rel-clause">⚑ ${r.clause}</span>`:''}</a>`;
    });
    html+=`</div></div>`;
  }
  html+='</div>';
  document.getElementById('mainContent').innerHTML=html;
  if(links.length) renderSubGraph(node,links);
}

// ── 渲染体系页 ──
function renderSystem(system){
  document.getElementById('breadcrumb').textContent='› '+system;
  document.title=system+' - 体系详情';
  const sysNodes=NODES.filter(n=>n.stage===system).sort((a,b)=>a.year.localeCompare(b.year));
  const desc=SYSTEM_DESCS[system]||system+'相关政策体系';
  let html=`<div class="doc-card">
    <div class="doc-hdr"><h1>${system}</h1><span class="doc-badge" style="background:rgba(43,87,154,0.08);color:#2b579a">体系</span></div>
    <div class="sys-intro">${desc}</div>
    <div class="doc-section"><h3>🗺 体系政策关系图</h3><div class="sub-graph-wrap" id="sysGraph"></div><div class="sub-graph-hint">节点按时间排列，单击查看详情</div></div>
    <div class="doc-section"><h3>📑 全部政策（${sysNodes.length}项）</h3><div class="sys-node-list">`;
  sysNodes.forEach(n=>{
    html+=`<a class="sys-node-card" href="${docRoot}doc.html?policy=${n.id}">
      <span class="sn-dot" style="background:${n.color}"></span>
      <div><div class="sn-name">${n.name}${n.isNew?' <span style="font-size:9px;padding:0 4px;border-radius:3px;background:#c23531;color:#fff;margin-left:3px;">🆕</span>':''}</div><div class="sn-sub">${n.sub} · ${n.year}</div></div>
      <span style="margin-left:auto;font-size:11px;color:#94a3b8;">→</span></a>`;
  });
  html+=`</div></div></div>`;
  document.getElementById('mainContent').innerHTML=html;
  if(sysNodes.length) renderSysGraph(system,sysNodes);
}

// ── 子图谱（ECharts，无动画 + 无背景标签）──
function renderSubGraph(cn,links){
  const el=document.getElementById('subGraph'); if(!el) return;
  const ch=echarts.init(el);
  const isMob=isMobile();
  const R=isMob?140:200;
  const cx=isMob?190:300, cy=isMob?150:240;
  const N=Math.min(links.length,8);

  const nodes=[{id:'c',name:cn.name,x:cx,y:cy,
    itemStyle:{color:cn.color,shadowBlur:10,borderColor:'#fff',borderWidth:2}}];
  const edges=[];
  links.slice(0,N).forEach((r,i)=>{
    const a=(i/N)*2*Math.PI-Math.PI/2;
    const nx=cx+R*Math.cos(a), ny=cy+R*Math.sin(a);
    const rc=cn.isNew?'#c23531':'#2b579a';
    const nm=r.fn.length>11?r.fn.slice(0,10)+'…':r.fn;
    nodes.push({id:'r'+i,name:nm,fullNm:r.fn,x:nx,y:ny,url:r.url,
      itemStyle:{color:rc,borderColor:'#fff',borderWidth:1.5}});
    edges.push({source:'c',target:'r'+i,label:r.rel,
      lineStyle:{color:'#94a3b8',width:1.4,curveness:0.03}});
  });

  ch.setOption({
    backgroundColor:'transparent',
    animationDuration:0,
    series:[{type:'graph',layout:'none',symbol:'roundRect',
      symbolSize:function(v,p){
        if(p.data.id==='c') return isMob?[130,34]:[145,36];
        return isMob?[130,30]:[155,32];
      },
      label:{show:true,position:'inside',
        formatter:p=>p.data.id==='c'?`{c|${p.data.name}}`:`{r|${p.data.name}}`,
        rich:{c:{fontSize:isMob?11:12,fontWeight:700,color:'#fff'},
              r:{fontSize:isMob?9:11,fontWeight:600,color:'#fff'}}},
      edgeLabel:{show:true,
        formatter:p=>p.data.label||'',color:'#4a6a8a',
        fontSize:isMob?8:9,backgroundColor:'transparent',
        padding:0,borderRadius:0,borderWidth:0,position:'middle'},
      edgeSymbol:['none','arrow'],edgeSymbolSize:[0,5],
      data:nodes,links:edges,lineStyle:{curveness:0.03,opacity:0.6},
      itemStyle:{borderColor:'#fff',borderWidth:1.2},
      roam:isMob
    }]
  });
  ch.on('click',p=>{if(p.dataType==='node'&&p.data.url) window.open(p.data.url,'_blank');});
  window.addEventListener('resize',()=>{try{ch.resize()}catch(e){}});
}

// ── 体系图谱 ──
function renderSysGraph(system,nodes){
  const el=document.getElementById('sysGraph'); if(!el||!nodes.length) return;
  const ch=echarts.init(el);
  const isMob=isMobile();
  const N=nodes.length;
  const cx=isMob?180:280, cy=isMob?120:160;
  const R=N<=3?(isMob?70:90):(isMob?90:120);

  const nds=nodes.map((n,i)=>{
    const a=(i/N)*2*Math.PI-Math.PI/2;
    return{id:n.id,name:n.name,sub:n.sub,yr:n.year,
      x:cx+R*Math.cos(a),y:cy+R*Math.sin(a),
      link:docRoot+'doc.html?policy='+n.id,
      itemStyle:{color:n.color,shadowBlur:n.isNew?12:4,borderColor:n.isNew?'#fbbf24':'#fff',borderWidth:n.isNew?2:1.5}};
  });

  ch.setOption({
    backgroundColor:'transparent',
    animationDuration:0,
    series:[{type:'graph',layout:'none',symbol:'roundRect',symbolSize:isMob?[145,36]:[165,42],
      label:{show:true,position:'inside',
        formatter:p=>`{n|${p.data.name}}\n{y|${p.data.yr}}`,
        rich:{n:{fontSize:isMob?10:12,fontWeight:700,color:'#fff',lineHeight:isMob?14:18},y:{fontSize:isMob?7:9,color:'rgba(255,255,255,0.6)'}}},
      data:nds,lineStyle:{curveness:0.03},
      roam:isMob
    }]
  });
  ch.on('click',p=>{if(p.dataType==='node'&&p.data.link) window.open(p.data.link,'_self');});
  window.addEventListener('resize',()=>{try{ch.resize()}catch(e){}});
}

// ═══ 启动 ═══════════════════════════════════════════════════
const pid=params.get('policy'), sn=params.get('system');
if(pid) renderPolicy(pid);
else if(sn) renderSystem(sn);
else {
  document.getElementById('breadcrumb').textContent='› 全部政策';
  document.title='政策文档索引';
  let h=`<div class="doc-card"><div class="doc-hdr"><h1>全部政策文档</h1></div><div class="sys-node-list">`;
  NODES.sort((a,b)=>a.year.localeCompare(b.year)).forEach(n=>{
    const bc=n.isNew?'#c23531':'#2b579a';
    h+=`<a class="sys-node-card" href="${docRoot}doc.html?policy=${n.id}"><span class="sn-dot" style="background:${n.color}"></span><div><div class="sn-name">${n.name}</div><div class="sn-sub">${n.sub} · ${n.year} · ${n.stage}</div></div><span style="margin-left:auto;font-size:11px;color:#94a3b8;">→</span></a>`;
  });
  h+=`</div><div style="margin-top:12px;display:flex;flex-wrap:wrap;gap:6px;">`;
  Object.keys(SYSTEM_DESCS).forEach(s=>{h+=`<a class="doc-tag" href="${docRoot}doc.html?system=${encodeURIComponent(s)}" style="background:rgba(43,87,154,0.06);color:#2b579a;">🗂 ${s}</a>`;});
  h+=`</div></div>`;
  document.getElementById('mainContent').innerHTML=h;
}
